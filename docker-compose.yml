services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pos_app
      MYSQL_USER: pos
      MYSQL_PASSWORD: pos_password
    ports:
      - "3306:3306"
    volumes:
      - pos_mysql_data:/var/lib/mysql

volumes:
  pos_mysql_data:
